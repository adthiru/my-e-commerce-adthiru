version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo '' > ~/.nvm/default-packages
        - nvm install 16
        - nvm use 16
        - node --version
        - npm install
    build:
      commands:
        - npx next build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
